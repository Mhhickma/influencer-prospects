name: Fetch Keepa Data
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install keepa && pip install creatorsapi-python-sdk.zip
      - name: Run Keepa fetch
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          CREATORS_CREDENTIAL_ID: ${{ secrets.CREATORS_CREDENTIAL_ID }}
          CREATORS_CREDENTIAL_SECRET: ${{ secrets.CREATORS_CREDENTIAL_SECRET }}
        run: python keepa_fetch.py
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update prospects $(date -u '+%Y-%m-%d')"
          git push
