<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProspectDash</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f4f8;--surface:#fff;--surface2:#f0f0f5;--border:#e0e0ea;
    --accent:#6457e8;--accent2:#e8874a;--green:#16a34a;--red:#dc2626;
    --yellow:#d97706;--text:#1a1a2e;--muted:#7070a0;
    --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
  #app{display:block}
  header{border-bottom:1px solid var(--border);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:10}
  .logo{font-size:16px;font-weight:800;letter-spacing:-.3px}
  .logo span{color:var(--accent)}
  .header-stats{display:flex;gap:24px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .header-stats strong{color:var(--text)}
  .status-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 40px;display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:12px;color:var(--muted)}
  #import-status{color:var(--green)}
  .controls{padding:24px 40px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
  .filter-btn{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:6px 16px;color:var(--muted);font-family:var(--mono);font-size:12px;cursor:pointer;transition:all .2s}
  .filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(100,87,232,.08)}
  .search-wrap{margin-left:auto;position:relative}
  .search-wrap input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 14px 7px 32px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;width:200px;transition:border-color .2s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;padding:32px 40px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .2s;animation:fadeUp .4s ease both}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 24px rgba(100,87,232,.12)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .card-img{width:100%;height:180px;object-fit:contain;background:var(--surface2);padding:16px;border-bottom:1px solid var(--border)}
  .card-img-placeholder{width:100%;height:180px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:32px}
  .card-body{padding:18px}
  .card-brand{font-size:11px;font-family:var(--mono);color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
  .card-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
  .metric{background:var(--surface2);border-radius:8px;padding:10px 12px}
  .metric-label{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
  .metric-value{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--text)}
  .metric-value.green{color:var(--green)}.metric-value.red{color:var(--red)}.metric-value.yellow{color:var(--yellow)}
  .trend-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
  .trend-growing{background:rgba(22,163,74,.10);color:var(--green);border:1px solid rgba(22,163,74,.25)}
  .trend-declining{background:rgba(220,38,38,.10);color:var(--red);border:1px solid rgba(220,38,38,.25)}
  .trend-stable{background:rgba(217,119,6,.10);color:var(--yellow);border:1px solid rgba(217,119,6,.25)}
  .accel-tag{font-family:var(--mono);font-size:10px;color:var(--accent2);background:rgba(232,135,74,.1);border:1px solid rgba(232,135,74,.25);border-radius:4px;padding:2px 7px;display:inline-block;margin-left:6px}
  .card-footer{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
  .btn{flex:1;padding:8px;border-radius:7px;font-family:var(--mono);font-size:11px;text-align:center;text-decoration:none;font-weight:500;transition:opacity .2s;cursor:pointer;border:none}
  .btn:hover{opacity:.8}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-secondary{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .empty{grid-column:1/-1;text-align:center;padding:80px;color:var(--muted);font-family:var(--mono);font-size:14px}
</style>
</head>
<body>



<div id="app">
  <header>
    <div class="logo">Prospect<span>Dash</span></div>
    <div class="header-stats">
      <span>Total: <strong id="stat-total">0</strong></span>
      <span>Avg Revenue: <strong id="stat-avg">$0</strong></span>
      <span>Growing: <strong id="stat-growing">0</strong></span>
    </div>
  </header>
  <div class="status-bar">
    <span id="import-status">⏳ Loading prospects...</span>
    <span id="last-updated"></span>
  </div>
  <div class="controls">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('Growing',this)">📈 Growing</button>
    <button class="filter-btn" onclick="setFilter('Stable',this)">➡️ Stable</button>
    <button class="filter-btn" onclick="setFilter('Declining',this)">📉 Declining</button>
    <button class="filter-btn" onclick="setFilter('accelerating',this)">⚡ Accelerating</button>
    <div class="search-wrap">
      <input type="text" placeholder="search brand or title..." oninput="searchCards(this.value)">
    </div>
  </div>
  <div class="grid" id="card-grid"></div>
</div>

<script>
// no password - load on start
document.addEventListener("DOMContentLoaded", loadData);

let prospects = [];
let activeFilter = 'all';
let searchTerm = '';

async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    if (!res.ok) throw new Error('No data');
    const json = await res.json();
    prospects = json.prospects || [];
    document.getElementById('import-status').textContent = `✓ ${prospects.length} prospects loaded`;
    document.getElementById('last-updated').textContent = `Last updated: ${json.last_updated || ''}`;
    renderCards(prospects);
  } catch(e) {
    document.getElementById('import-status').style.color = 'var(--yellow)';
    document.getElementById('import-status').textContent = '⚠️ No data yet — run the GitHub Actions workflow first.';
  }
}

function renderCards(data) {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  const filtered = data.filter(p => {
    const mf = activeFilter === 'all' ? true : activeFilter === 'accelerating' ? p.accelerating : p.sales_trend === activeFilter;
    const ms = searchTerm === '' ? true : (p.brand||'').toLowerCase().includes(searchTerm)||(p.title||'').toLowerCase().includes(searchTerm);
    return mf && ms;
  });
  document.getElementById('stat-total').textContent = filtered.length;
  const avg = filtered.length ? Math.round(filtered.reduce((s,p)=>s+(p.monthly_revenue||0),0)/filtered.length) : 0;
  document.getElementById('stat-avg').textContent = '$'+avg.toLocaleString();
  document.getElementById('stat-growing').textContent = filtered.filter(p=>p.sales_trend==='Growing').length;
  if (!filtered.length) { grid.innerHTML='<div class="empty">no prospects match this filter</div>'; return; }
  filtered.forEach((p,i) => {
    const trendClass = p.sales_trend==='Growing'?'trend-growing':p.sales_trend==='Declining'?'trend-declining':'trend-stable';
    const trendIcon = p.sales_trend==='Growing'?'↑':p.sales_trend==='Declining'?'↓':'→';
    const trendSign = (p.sales_trend_pct||0)>0?'+':'';
    const ratingColor = (p.rating||0)>=4.5?'green':(p.rating||0)>=4.0?'yellow':'red';
    const d90 = p.sales_rank_drops_90||0;
    const d30 = p.sales_rank_drops_30||0;
    const proxyUrl = p.image_url ? `https://images.weserv.nl/?url=${encodeURIComponent(p.image_url)}&w=400&output=webp` : '';
    const imgHtml = proxyUrl ? `<img class="card-img" src="${proxyUrl}" alt="${p.brand||''}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
    const ph = `<div class="card-img-placeholder" ${proxyUrl?'style="display:none"':''}>📦</div>`;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i*0.05}s`;
    card.innerHTML = `
      ${imgHtml}${ph}
      <div class="card-body">
        <div class="card-brand">${p.brand||''}</div>
        <div class="card-title">${p.title||''}</div>
        <div class="card-metrics">
          <div class="metric"><div class="metric-label">Monthly Rev</div><div class="metric-value green">$${(p.monthly_revenue||0).toLocaleString()}</div></div>
          <div class="metric"><div class="metric-label">Price / Units</div><div class="metric-value">$${p.buybox_price||0} · ${p.monthly_units||0}</div></div>
          <div class="metric"><div class="metric-label">Rating</div><div class="metric-value ${ratingColor}">★ ${p.rating||'—'} <span style="color:var(--muted);font-size:11px">(${(p.review_count||0).toLocaleString()})</span></div></div>
          <div class="metric"><div class="metric-label">Influencer Videos</div>
            <div class="metric-value" style="color:${(p.influencer_count||0)===0?'var(--green)':(p.influencer_count||0)<=3?'var(--yellow)':'var(--red)'}">
              ${p.influencer_count||0} <span style="font-size:11px;color:var(--muted)">${(p.influencer_count||0)===0?'none yet':(p.influencer_count||0)<=1?'low comp':'some comp'}</span>
            </div>
          </div>
          <div class="metric"><div class="metric-label">Est. Daily Sales</div>
            <div class="metric-value" style="display:flex;align-items:baseline;gap:5px">
              ~${Math.round(d90/90)}<span style="font-size:11px;color:var(--muted)">/day</span>
              <span style="font-size:11px;font-weight:600;color:${d30>(d90/3)?'var(--green)':'var(--red)'}">
                ${d30>(d90/3)?'▲ picking up':'▼ slowing'}
              </span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="trend-badge ${trendClass}">${trendIcon} ${p.sales_trend} ${trendSign}${p.sales_trend_pct||0}%</span>
          ${p.accelerating?'<span class="accel-tag">⚡ accel</span>':''}
        </div>
        <div class="card-footer">
          <a class="btn btn-primary" href="${p.amazon_url||'#'}" target="_blank">View Listing</a>
          <a class="btn btn-secondary" href="${p.brand_store_url||'#'}" target="_blank">Brand Store</a>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function setFilter(f,btn) {
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(prospects);
}
function searchCards(val) { searchTerm=val.toLowerCase(); renderCards(prospects); }
</script>
</body>
</html>
